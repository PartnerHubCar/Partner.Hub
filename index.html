<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auto Gadgets 2026</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0d0d0d;
    color: white;
}

header {
    background: black;
    padding: 15px;
    text-align: center;
    font-size: 20px;
}

.hero {
    padding: 40px;
    text-align: center;
    background: linear-gradient(45deg, orange, red);
}

.container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #1a1a1a;
    padding: 15px;
    border-radius: 10px;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.05);
}

.card img {
    width: 100%;
    border-radius: 10px;
}

.btn {
    display: block;
    margin-top: 10px;
    padding: 10px;
    background: orange;
    text-align: center;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}
</style>

</head>
<body>

<header>
🚗 Auto Gadgets & Tools
</header>

<div class="hero">
<h1>Die besten Auto Produkte 2026</h1>
<p>Empfohlen von Schraubern</p>
</div>

<div class="container">

<div class="card">
<img src="IMG_5174.jpeg">
<h3>OBD2 Diagnosegerät</h3>
<p>Fehler auslesen & Geld sparen.</p>
<a href="https://amzn.eu/d/07yrrfDA" class="btn">Jetzt ansehen</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<h3>LED Scheinwerfer</h3>
<p>Besser sehen bei Nacht.</p>
<a href="DEIN_LINK" class="btn">Zum Angebot</a>
</div>

<div class="card">
<img src="https://via.placeholder.com/300x200">
<h3>Drehmomentschlüssel</h3>
<p>Perfekt für jede Werkstatt.</p>
<a href="DEIN_LINK" class="btn">Jetzt kaufen</a>
</div>

</div>

</body>
</html>
